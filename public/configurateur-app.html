<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONE PRINT — Chiffrage SLS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#F5F2E8;
  --green:#004B32;
  --lime:#AAE66E;
  --orange:#FF6C4F;
  --white:#ffffff;
  --border:#E2DED2;
  --muted:#8A8478;
  --text:#1C1C1A;
}

body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
header{
  background:var(--green);
  padding:1.125rem 2rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;
}
.logo h1{
  font-family:'Sora',sans-serif;font-weight:700;font-size:1.375rem;
  color:#fff;text-transform:uppercase;letter-spacing:-.025em;line-height:1.2;
}
.logo h1 .accent{color:var(--orange)}
.logo-img{
  display:block;height:42px;width:auto;background:transparent;
}
.logo p{font-size:.78rem;color:rgba(170,230,110,.85);margin-top:.15rem;letter-spacing:.02em}
.hright{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.hbadge{
  background:var(--lime);color:var(--green);
  font-family:'Sora',sans-serif;font-weight:700;font-size:.72rem;
  text-transform:uppercase;letter-spacing:.03em;
  padding:.375rem .875rem;border-radius:100px;
}

/* CART PILL */
.cart-pill{
  position:relative;display:inline-flex;align-items:center;gap:.4rem;
  background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);
  border-radius:100px;padding:.35rem .7rem;color:#fff;cursor:pointer;
  transition:all .15s;
}
.cart-pill:hover{background:rgba(255,255,255,.2)}
.cart-pill .cart-count{
  font-family:'Sora',sans-serif;font-weight:700;font-size:.72rem;
  min-width:18px;height:18px;padding:0 .3rem;border-radius:100px;
  background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;line-height:1;
}
.cart-pill.has-items .cart-count{background:var(--lime);color:var(--green)}

/* PASTILLE UTILISATEUR */
.user-pill-wrap{position:relative;display:inline-flex}
.user-pill{
  width:40px;height:40px;border-radius:50%;
  background:var(--green);border:2px solid rgba(255,255,255,.85);
  color:#fff;font-family:'Sora',sans-serif;font-weight:700;font-size:.85rem;
  letter-spacing:.02em;display:flex;align-items:center;justify-content:center;
  cursor:pointer;padding:0;
}
.user-pill:hover{border-color:var(--lime)}
.user-pill.guest{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.4)}
.user-tooltip{
  position:absolute;top:calc(100% + 8px);right:0;
  background:rgba(0,0,0,.82);color:#fff;font-size:.72rem;font-weight:500;
  white-space:nowrap;padding:.375rem .625rem;border-radius:8px;
  pointer-events:none;opacity:0;transform:translateY(-4px);
  transition:opacity .15s ease,transform .15s ease;z-index:50;
}
.user-pill-wrap:hover .user-tooltip{opacity:1;transform:translateY(0)}
.user-tooltip:empty{display:none}
.user-menu{
  position:absolute;top:calc(100% + 8px);right:0;min-width:192px;
  background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.18);
  padding:6px;display:flex;flex-direction:column;z-index:55;
}
.user-menu-head{
  font-family:'Sora',sans-serif;font-weight:700;font-size:.8rem;color:var(--green);
  padding:8px 12px 6px;border-bottom:1px solid #f0ece0;margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px;
}
.user-menu-item{
  background:none;border:none;text-align:left;
  font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:500;color:#1c1c1a;
  padding:9px 12px;border-radius:8px;cursor:pointer;
}
.user-menu-item:hover{background:rgba(0,75,50,.07)}
.user-menu-danger{color:#c62828}
.user-menu-danger:hover{background:rgba(198,40,40,.08)}
.user-menu-div{height:1px;background:#f0ece0;margin:4px 6px}

/* BOUTON AJOUTER AU PANIER */
.btn-cart{
  display:block;width:100%;margin-top:.625rem;
  background:var(--green);color:var(--white);
  border:none;border-radius:100px;padding:.75rem 1.5rem;
  font-family:'Sora',sans-serif;font-size:.875rem;font-weight:700;
  letter-spacing:.02em;cursor:pointer;transition:opacity .15s;text-align:center;
}
.btn-cart:hover{opacity:.87}
.cart-flash{animation:cartFlash .4s ease}
@keyframes cartFlash{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}

/* LANG SELECTOR */
.lang-pills{display:flex;gap:.375rem;flex-wrap:wrap}
.lang-btn{
  background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);
  border-radius:100px;padding:.3rem .7rem;
  font-family:'Sora',sans-serif;font-weight:600;font-size:.72rem;
  color:rgba(255,255,255,.75);cursor:pointer;transition:all .15s;letter-spacing:.04em;
}
.lang-btn:hover{background:rgba(255,255,255,.2);color:#fff}
.lang-btn.active{background:var(--lime);border-color:var(--lime);color:var(--green)}

/* LAYOUT */
.page-layout{
  max-width:1100px;margin:0 auto;padding:2rem 1.5rem;
  display:flex;gap:1.5rem;align-items:flex-start;
}
.col-left{flex:1;min-width:0;display:flex;flex-direction:column;gap:1.5rem}
.col-right{width:380px;flex-shrink:0;display:flex;flex-direction:column;gap:1.5rem}
.page-layout.no-viewer .col-left{display:none}
.page-layout.no-viewer{justify-content:center}
.page-layout.no-viewer .col-right{width:100%;max-width:480px}
#pricecard{width:100%}

@media(max-width:820px){
  .page-layout{flex-direction:column;padding:1rem}
  .col-left,.col-right{width:100%}
  .page-layout.no-viewer .col-right{width:100%;max-width:none}
  header{padding:1rem 1.25rem}
  .logo h1{font-size:1.15rem}
}

/* CARDS */
.card{
  background:var(--white);border-radius:18px;padding:1.625rem;
  box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,75,50,.06);
}
.stitle{
  font-family:'Sora',sans-serif;font-weight:700;font-size:.875rem;
  text-transform:uppercase;color:var(--green);letter-spacing:.05em;
  margin-bottom:1.25rem;display:flex;align-items:center;gap:.5rem;
}
.stitle::before{
  content:'';display:block;width:8px;height:8px;
  border-radius:50%;background:var(--lime);flex-shrink:0;
}
.stitle.orange::before{background:var(--orange)}

/* DROP ZONE */
.dz{
  position:relative;border:2px dashed var(--border);border-radius:14px;
  background:var(--bg);padding:3rem 2rem;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;
}
.dz:hover,.dz.over{border-color:var(--green);background:rgba(0,75,50,.03)}
.dz input[type=file]{
  position:absolute;inset:0;opacity:0;cursor:pointer;
  width:100%;height:100%;font-size:0;
}
.dicon{width:60px;height:60px;margin:0 auto 1.125rem}
.dhead{
  font-family:'Sora',sans-serif;font-weight:600;font-size:.975rem;
  color:var(--green);margin-bottom:.4rem;
}
.dsub{font-size:.825rem;color:var(--muted)}

/* PARSING */
.parse-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.75rem;padding:1.5rem;font-size:.875rem;color:var(--green);
}
.parse-row{display:flex;align-items:center;justify-content:center;gap:.625rem}
.spinner{
  width:18px;height:18px;border:2px solid var(--lime);
  border-top-color:var(--green);border-radius:50%;
  animation:spin .65s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
/* Barre de progression chargement/parsing STL */
.parse-bar{
  width:100%;max-width:280px;height:7px;border-radius:999px;
  background:rgba(0,75,50,.12);overflow:hidden;
}
.parse-bar-fill{
  height:100%;width:0;border-radius:999px;
  background:linear-gradient(90deg,var(--green),var(--lime));
  transition:width .18s ease;
}

/* FILE LOADED */
.finfo{
  display:flex;align-items:center;gap:1rem;
  padding:.875rem 1.125rem;
  background:rgba(170,230,110,.12);border:1.5px solid rgba(170,230,110,.5);
  border-radius:12px;
}
.fthumb{
  width:44px;height:44px;background:var(--green);border-radius:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.fmeta{flex:1;min-width:0}
.fmeta .fn{
  font-family:'Sora',sans-serif;font-weight:600;font-size:.875rem;
  color:var(--green);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.fmeta .fv{font-size:.82rem;color:var(--muted);margin-top:.2rem}
.fmeta .fv strong{color:var(--green)}
.btn-chg{
  background:none;border:1.5px solid var(--border);border-radius:100px;
  padding:.35rem .875rem;font-family:'DM Sans',sans-serif;
  font-size:.8rem;color:var(--muted);cursor:pointer;white-space:nowrap;
  transition:all .15s;flex-shrink:0;
}
.btn-chg:hover{border-color:var(--orange);color:var(--orange)}

/* PIECES LIST */
.pieces-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:.75rem;}
.piece-item{display:flex;align-items:center;gap:.75rem;padding:.625rem .875rem;background:rgba(170,230,110,.1);border:1.5px solid rgba(170,230,110,.4);border-radius:10px;}
.pdel{margin-left:auto;background:none;border:1.5px solid var(--border);border-radius:50%;width:24px;height:24px;font-size:1rem;line-height:1;color:var(--muted);cursor:pointer;transition:all .15s;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.pdel:hover{border-color:var(--orange);color:var(--orange);}
.piece-qty{display:flex;align-items:center;gap:.3rem;flex-shrink:0;}
.piece-qty button{background:var(--green);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:.9rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;}
.piece-qty input{width:38px;text-align:center;border:1.5px solid var(--border);border-radius:6px;font-size:.78rem;font-family:'Sora',sans-serif;font-weight:600;color:var(--green);padding:.15rem .2rem;background:#fff;}

/* ERROR */
.err{
  margin-top:.875rem;padding:.7rem 1rem;
  background:#FFF1EE;border:1.5px solid #FFC7BB;
  border-radius:10px;font-size:.825rem;color:#C53D2A;
}

/* OPT GROUPS */
.og{margin-bottom:1.5rem}
.og:last-child{margin-bottom:0}
.olbl{
  font-family:'Sora',sans-serif;font-weight:600;font-size:.72rem;
  text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.625rem;
}
.olbl.required{color:var(--green)}
.olbl.required::after{content:' *';color:var(--orange)}

/* APP TYPE — prominent */
.app-pills .pill label{
  padding:.55rem 1.1rem;font-size:.875rem;font-weight:500;
}

/* MATERIAL CHIP */
.mchip{
  display:inline-flex;align-items:center;gap:.5rem;
  background:var(--bg);border:1.5px solid var(--border);border-radius:100px;
  padding:.5rem 1rem;font-size:.875rem;color:var(--green);font-weight:500;
}
.mchip .cc{
  width:20px;height:20px;background:var(--lime);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}

/* PILLS */
.pills{display:flex;flex-wrap:wrap;gap:.5rem}
.pill input{display:none}
.pill label{
  display:inline-flex;align-items:center;gap:.375rem;
  padding:.45rem 1rem;border:1.5px solid var(--border);border-radius:100px;
  font-size:.85rem;color:var(--muted);cursor:pointer;transition:all .15s;
  user-select:none;background:var(--white);
}
.pill label .tag{font-size:.72rem;opacity:.7}
.pill label .plus{color:var(--lime);opacity:1}
.pill input:checked+label{background:var(--green);border-color:var(--green);color:var(--white)}
.pill input:checked+label .plus{color:var(--lime)}
.pill label:hover{border-color:var(--green);color:var(--green)}
.pill input:checked+label:hover{color:var(--white)}
.cdot{width:11px;height:11px;border-radius:50%;border:1.5px solid rgba(0,0,0,.15);flex-shrink:0}

/* QTY */
.qty-ctrl{display:flex;align-items:center;gap:.5rem}
.qty-btn{
  width:32px;height:32px;border:1.5px solid var(--border);border-radius:100px;
  background:var(--white);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1.1rem;color:var(--green);transition:all .15s;flex-shrink:0;
  font-family:'DM Sans',sans-serif;line-height:1;
}
.qty-btn:hover{border-color:var(--green);background:rgba(0,75,50,.05)}
#qty{
  width:64px;height:32px;border:1.5px solid var(--border);border-radius:100px;
  text-align:center;font-family:'Sora',sans-serif;font-size:.9rem;font-weight:600;
  color:var(--green);background:var(--white);outline:none;
}
#qty:focus{border-color:var(--green)}

/* CHECKBOXES */
.checks{display:flex;flex-direction:column;gap:.625rem}
.ci{display:flex;align-items:center;gap:.75rem;cursor:pointer}
.ci input{display:none}
.cbox{
  width:22px;height:22px;border:2px solid var(--border);border-radius:6px;
  background:var(--white);display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.ci input:checked~.cbox{background:var(--green);border-color:var(--green)}
.ck{display:none}
.ci input:checked~.cbox .ck{display:block}
.ct{flex:1}
.ct .cn{font-size:.875rem;color:var(--text)}
.ct .cp{font-family:'Sora',sans-serif;font-size:.78rem;color:var(--green);font-weight:600;margin-top:.1rem}

/* ── VIEWER ── */
#viewercard{padding:1.375rem}
#viewercard .stitle{margin-bottom:.875rem}
.vcvs{
  width:100%;height:268px;border-radius:12px;overflow:hidden;
  background:var(--bg);cursor:grab;
}
.vcvs:active{cursor:grabbing}
.vcvs canvas{display:block!important;width:100%!important;height:100%!important}
.vhint{
  display:flex;align-items:center;justify-content:center;
  gap:.5rem;margin-top:.625rem;font-size:.72rem;color:var(--muted);
}
.vsep{opacity:.35}
.vreset{
  background:none;border:1px solid var(--border);border-radius:100px;
  padding:.2rem .625rem;font-size:.72rem;font-family:'DM Sans',sans-serif;
  color:var(--muted);cursor:pointer;transition:all .15s;
}
.vreset:hover{border-color:var(--green);color:var(--green)}
.viewer-tabs{
  display:flex;flex-wrap:wrap;gap:.375rem;
  margin-top:.625rem;padding-top:.625rem;
  border-top:1px solid var(--border);
}
.viewer-tab{
  font-family:'Sora',sans-serif;font-size:.68rem;font-weight:600;
  padding:.3rem .65rem;border-radius:100px;
  border:1.5px solid var(--border);
  background:rgba(255,255,255,.5);color:var(--muted);
  cursor:pointer;transition:all .15s;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px;
}
.viewer-tab:hover{border-color:var(--lime);color:var(--green)}
.viewer-tab.active{background:var(--lime);border-color:var(--lime);color:var(--green)}
.vbadge{
  margin-left:auto;font-family:'DM Sans',sans-serif;
  font-weight:500;font-size:.72rem;padding:.2rem .6rem;
  border-radius:100px;border:1px solid;text-transform:none;letter-spacing:0;
}
.vbadge.rot{color:var(--lime);border-color:rgba(170,230,110,.4);background:rgba(170,230,110,.08)}
.vbadge.man{color:var(--muted);border-color:var(--border);background:none}

/* UNIT SELECTOR */
.unit-selector{
  display:flex;align-items:center;gap:.625rem;flex-wrap:wrap;
  margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);
}
.unit-lbl{
  font-family:'Sora',sans-serif;font-weight:600;font-size:.7rem;
  text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
}
.unit-pills{display:flex;gap:.3rem}
.unit-btn{
  font-family:'Sora',sans-serif;font-weight:600;font-size:.72rem;
  padding:.25rem .7rem;border-radius:100px;
  border:1.5px solid var(--border);background:var(--white);
  color:var(--muted);cursor:pointer;transition:all .15s;
}
.unit-btn:hover{border-color:var(--green);color:var(--green)}
.unit-btn.active{background:var(--green);border-color:var(--green);color:var(--white)}
.unit-warning{
  margin-top:.625rem;font-size:.72rem;line-height:1.45;color:#8A6D00;
  background:#FFF8E6;border:1px solid #F2E2A8;border-radius:8px;
  padding:.5rem .7rem;
}
.unit-warning:empty{display:none}

/* PRICE PANEL */
.pempty{text-align:center;padding:2.5rem 1rem;color:var(--muted)}
.pempty svg{margin:0 auto .875rem;display:block;color:var(--border)}
.pempty p{font-size:.875rem;line-height:1.6}

.vpill{
  background:linear-gradient(135deg,rgba(0,75,50,.04),rgba(170,230,110,.12));
  border:1px solid rgba(170,230,110,.6);border-radius:12px;
  padding:.875rem 1.125rem;margin-bottom:1.25rem;
  display:flex;align-items:center;
}
.vpill .vl{
  font-size:.72rem;font-family:'Sora',sans-serif;font-weight:600;
  text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.2rem;
}
.vpill .vv{font-family:'Sora',sans-serif;font-weight:700;font-size:1.25rem;color:var(--green)}
.vpill .vv small{font-size:.8rem;font-weight:400;color:var(--muted)}

.prows{margin-bottom:1rem}
.prow{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:.55rem 0;border-bottom:1px solid var(--bg);font-size:.875rem;
}
.prow .pl{color:var(--muted);flex:1;padding-right:.5rem}
.prow .pv{font-family:'Sora',sans-serif;font-weight:600;color:var(--text);white-space:nowrap}
.prow .pv.add{color:var(--green)}
.prow .pv.disc{color:var(--orange)}
.pminsub{font-size:.72rem;color:var(--muted);font-style:italic;margin-top:.1rem}
.p-indicative{font-style:italic;font-size:.72rem;color:#888;margin-top:-.85rem;margin-bottom:1.1rem}
.pmincolor{font-size:.72rem;color:var(--orange);font-weight:600;margin-top:.1rem}

.totals{border-top:1.5px solid var(--border);padding-top:.875rem}
.trow{
  display:flex;justify-content:space-between;align-items:center;
  padding:.35rem 0;font-size:.875rem;
}
.trow .tl{color:var(--muted)}
.trow .tv{font-family:'Sora',sans-serif;font-weight:600}

.gtotal{
  background:rgba(0,75,50,.06);border:1.5px solid rgba(0,75,50,.18);border-radius:14px;
  padding:1.125rem 1.375rem;margin-top:.875rem;
}
.gtotal .gt-ht-lbl{font-family:'Sora',sans-serif;font-weight:600;font-size:.78rem;color:#004B32;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.15rem}
.gtotal .gta{font-family:'Sora',sans-serif;font-weight:800;font-size:2.125rem;color:#004B32;line-height:1}
.gtotal .gta sup{font-size:1rem;font-weight:600;vertical-align:super;margin-left:.1rem;color:rgba(0,75,50,.6)}
.gtotal .gt-ttc{font-family:'DM Sans',sans-serif;font-size:.85rem;color:#888;margin-top:.35rem}

.pnote{text-align:center;font-size:.75rem;color:var(--muted);margin-top:.875rem;line-height:1.5}
.pvalidity{font-size:.75rem;color:var(--muted);text-align:center;margin-top:.3rem}

/* PDF BUTTON */
.btn-pdf{
  display:block;width:100%;margin-top:1rem;
  background:var(--orange);color:var(--white);
  border:none;border-radius:100px;padding:.75rem 1.5rem;
  font-family:'Sora',sans-serif;font-size:.875rem;font-weight:700;
  letter-spacing:.02em;cursor:pointer;transition:opacity .15s;
  text-align:center;
}
.btn-pdf:hover{opacity:.87}

/* SIMULATION TABLE */
#simcard table{width:100%;border-collapse:collapse;font-size:.84rem}
#simcard thead th{
  font-family:'Sora',sans-serif;font-size:.7rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.07em;color:var(--muted);
  padding:.4rem .625rem .625rem;text-align:right;border-bottom:1.5px solid var(--border);
}
#simcard thead th:first-child{text-align:left}
#simcard tbody td{
  padding:.55rem .625rem;border-bottom:1px solid var(--bg);
  font-family:'DM Sans',sans-serif;color:var(--text);text-align:right;

// ── STL volume parser ────────────────────────────────────────────────────────

function svt(ax,ay,az,bx,by,bz,cx,cy,cz){
  return(ax*(by*cz-bz*cy)+ay*(bz*cx-bx*cz)+az*(bx*cy-by*cx))/6;
}
function parseBin(buf){
  const dv=new DataView(buf);
  const n=dv.getUint32(80,true);
  if(buf.byteLength<84+n*50) throw new Error('Fichier tronque');
  let v=0;
  for(let i=0;i<n;i++){
    const o=84+i*50+12;
    v+=svt(dv.getFloat32(o,true),dv.getFloat32(o+4,true),dv.getFloat32(o+8,true),
           dv.getFloat32(o+12,true),dv.getFloat32(o+16,true),dv.getFloat32(o+20,true),
           dv.getFloat32(o+24,true),dv.getFloat32(o+28,true),dv.getFloat32(o+32,true));
  }
  return Math.abs(v);
}
function parseAscii(buf){
  const txt=new TextDecoder().decode(buf);
  const re=/vertex\s+([-\d.eE+]+)\s+([-\d.eE+]+)\s+([-\d.eE+]+)/g;
  const pts=[];let m;
  while((m=re.exec(txt))!==null) pts.push(+m[1],+m[2],+m[3]);
  let v=0;
  for(let i=0;i<pts.length;i+=9)
    v+=svt(pts[i],pts[i+1],pts[i+2],pts[i+3],pts[i+4],pts[i+5],pts[i+6],pts[i+7],pts[i+8]);
  return Math.abs(v);
}
function getVol(buf){
  if(buf.byteLength>=84){
    const n=new DataView(buf).getUint32(80,true);
    if(n>0&&buf.byteLength===84+n*50) return parseBin(buf);
  }
  return parseAscii(buf);
}

// ── 3D Viewer ────────────────────────────────────────────────────────────────

let renderer=null, scene=null, camera=null, controls=null;
let animId=null, resizeObs=null;
let savedDist=0;

function initViewer(buffer){
  const container=$('vcvs');
  cleanupViewer();
  const W=container.clientWidth, H=container.clientHeight;
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0xF5F2E8);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(W,H);
  renderer.outputColorSpace=THREE.SRGBColorSpace;
  container.appendChild(renderer.domElement);
  camera=new THREE.PerspectiveCamera(45,W/H,0.001,1e9);
  scene.add(new THREE.HemisphereLight(0xffffff,0xEDE9DC,0.85));
  const sun=new THREE.DirectionalLight(0xffffff,1.7);
  sun.position.set(4,8,5);
  scene.add(sun);
  const rim=new THREE.DirectionalLight(0xAAE66E,0.22);
  rim.position.set(-3,-1,-5);
  scene.add(rim);
  const geo=new STLLoader().parse(buffer);
  geo.computeVertexNormals();
  const mat=new THREE.MeshStandardMaterial({color:0xE8E3D8,roughness:0.65,metalness:0});
  const mesh=new THREE.Mesh(geo,mat);
  geo.computeBoundingBox();
  const center=new THREE.Vector3();
  geo.boundingBox.getCenter(center);
  mesh.position.copy(center).negate();
  scene.add(mesh);
  geo.computeBoundingSphere();
  const r=geo.boundingSphere.radius;
  const fov=camera.fov*Math.PI/180;
  const dist=(r*2.2)/Math.tan(fov/2);
  savedDist=dist;
  camera.position.set(dist*0.65,dist*0.42,dist*0.82);
  camera.lookAt(0,0,0);
  controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;
  controls.dampingFactor=0.07;
  controls.autoRotate=true;
  controls.autoRotateSpeed=1.4;
  controls.minDistance=r*0.3;
  controls.maxDistance=r*14;
  controls.addEventListener('start',()=>{ controls.autoRotate=false; setBadge('man'); });
  resizeObs=new ResizeObserver(()=>{
    if(!renderer||!camera) return;
    const W2=container.clientWidth, H2=container.clientHeight;
    renderer.setSize(W2,H2);
    camera.aspect=W2/H2;
    camera.updateProjectionMatrix();
  });
  resizeObs.observe(container);
  (function loop(){
    animId=requestAnimationFrame(loop);
    controls.update();
    renderer.render(scene,camera);
  })();
}

function cleanupViewer(){
  if(animId){ cancelAnimationFrame(animId); animId=null; }
  if(resizeObs){ resizeObs.disconnect(); resizeObs=null; }
  if(renderer){
    renderer.dispose();
    const c=renderer.domElement;
    if(c.parentNode) c.parentNode.removeChild(c);
    renderer=null;
  }
  if(scene){
    scene.traverse(obj=>{
      if(!obj.isMesh) return;
      obj.geometry.dispose();
      const m=obj.material;
      (Array.isArray(m)?m:[m]).forEach(x=>x.dispose());
    });
    scene=null;
  }
  if(controls){ controls.dispose(); controls=null; }
  camera=null;
}

function setBadge(state){
  const b=$('vbadge');
  if(!b) return;
  if(state==='rot'){ b.textContent=t('v_rot'); b.className='vbadge rot'; }

$('vreset').addEventListener('click',()=>{
  if(!controls||!camera) return;
  controls.autoRotate=true;
  setBadge('rot');
  const d=savedDist;
  camera.position.set(d*0.65,d*0.42,d*0.82);
  camera.lookAt(0,0,0);
  controls.target.set(0,0,0);
  controls.update();
});

const TIERS = [
  { min: 10000, rate: 0.15 },
  { min: 5000,  rate: 0.125 },
  { min: 1000,  rate: 0.10 },
  { min: 500,   rate: 0.05 },
  { min: 0,     rate: 0 },
];
const SIM_QTYS = [1, 10, 50, 100, 250];

function getDiscount(sub) {
  for (const tier of TIERS) {
    if (sub >= tier.min) return tier.rate;
  }
  return 0;
}
function getNextTier(sub) {
  const sorted = [...TIERS].reverse(); // ascending
  for (let i = 0; i < sorted.length; i++) {
    if (sub < sorted[i].min) return sorted[i];
  }
  return null;
}

function getOptions() {
  const appEl = document.querySelector('input[name=app]:checked');
  const fin = document.querySelector('input[name=fin]:checked').value;
  const col = document.querySelector('input[name=col]:checked').value;
  const delay = document.querySelector('input[name=delay]:checked').value;
  const liv = document.querySelector('input[name=liv]:checked').value;
  const nett = $('onett').checked;
  const dossier = $('odossier').checked;
  const qty = Math.max(1, parseInt($('qty').value) || 1);
  const app = appEl ? appEl.value : null;
  return { fin, col, delay, liv, nett, dossier, qty, app };
}

// Seuil au-dela duquel le minimum de 6 EUR/piece ne s'applique plus
const MIN_PIECE = 6;
const MIN_ORDER_THRESHOLD = 25;

function calcPrice(overrideQty) {
  if (!pieces.length) return null;
  const opts = getOptions();
  const numPieces = pieces.length;
  const multi = numPieces > 1;
  const delayRate = opts.delay === 'pri' ? 0.10 : opts.delay === 'exp' ? 0.25 : 0;

  const rows = pieces.map(piece => ({
    name: piece.name, vol: piece.vol, raw: piece.vol * 0.001,
    qty: overrideQty != null ? overrideQty : (multi ? (piece.qty || 1) : opts.qty)
  }));
  const anyBelowMin = rows.some(r => r.raw < MIN_PIECE);

  // Construit l'ensemble des totaux a partir d'un plancher de prix par piece
  function build(useMin) {
    let piecesTotal = 0;
    const pieceDetails = [];
    for (const r of rows) {
      const basePP = useMin ? Math.max(r.raw, MIN_PIECE) : r.raw;
      const delayPP = basePP * delayRate;
      const nettPP = opts.nett ? 25 : 0;
      const pricePP = basePP + delayPP + nettPP;
      piecesTotal += pricePP * r.qty;
      pieceDetails.push({ name: r.name, vol: r.vol, basePP, pricePP, qty: r.qty });
    }
    const totalQty = pieceDetails.reduce((s, pd) => s + pd.qty, 0);
    const rawFinish = opts.fin === 'lissage' ? totalQty * 2 : 0;
    const finishMinApplied = rawFinish > 0 && rawFinish < 100;
    const finishTotal = rawFinish > 0 ? Math.max(rawFinish, 100) : 0;
    const rawColor = opts.col !== 'blanc' ? totalQty * 2 : 0;
    const colorMinApplied = rawColor > 0 && rawColor < 100;
    const colorTotal = rawColor > 0 ? Math.max(rawColor, 100) : 0;
    const dossierTotal = opts.dossier ? 15 : 0;
    const livTotal = opts.liv === 'j1' ? 15 : 0;
    const subBefore = piecesTotal + finishTotal + colorTotal + dossierTotal + livTotal;
    const discRate = getDiscount(subBefore);
    const discAmount = subBefore * discRate;
    const ht = subBefore - discAmount;
    return {
      piecesTotal, pieceDetails, finishTotal, finishMinApplied,
      colorTotal, colorMinApplied, dossierTotal, livTotal,
      subBefore, discRate, discAmount, ht
    };
  }

  // 1) prix reel au mm3 sans plancher  2) plancher 6 EUR/piece uniquement si total < 25 EUR HT
  const noMin = build(false);
  const useMin = anyBelowMin && noMin.subBefore < MIN_ORDER_THRESHOLD;
  const r = useMin ? build(true) : noMin;

  const qty = overrideQty != null ? overrideQty : (multi ? null : opts.qty);
  return {
    minApplied: useMin,
    piecesTotal: r.piecesTotal, finishTotal: r.finishTotal, finishMinApplied: r.finishMinApplied,
    colorTotal: r.colorTotal, colorMinApplied: r.colorMinApplied,
    dossierTotal: r.dossierTotal, livTotal: r.livTotal,
    subBefore: r.subBefore, discRate: r.discRate, discAmount: r.discAmount, ht: r.ht,
    tva: r.ht * 0.20, ttc: r.ht * 1.20,
    nextTier: getNextTier(r.subBefore), qty, opts, pieceDetails: r.pieceDetails, numPieces
  };
}

function refresh() {
  if (!pieces.length) return;
  const opts = getOptions();
  const multi = pieces.length > 1;
  const p = multi ? calcPrice() : calcPrice(opts.qty);
  if (!p) return;

  // Volume total = somme de toutes les pieces
  const totalVol = pieces.reduce((s, pc) => s + pc.vol, 0);
  $('pvol').innerHTML = fvol(totalVol) + ' <small>mm3</small>';

  const prows = $('prows');
  prows.innerHTML = '';

  // Base price
  const baseRow = document.createElement('div');
  baseRow.className = 'prow';
  const minNote = p.minApplied ? '<br><span class="pminsub">' + t('p_min_applied') + '</span>' : '';
  baseRow.innerHTML = '<div class="pl">' + t('p_base') + minNote + '</div><span class="pv">' + eur(p.piecesTotal) + '</span>';
  prows.appendChild(baseRow);

  // Finition lissage vapeur
  if (p.finishTotal > 0) {
    const finRow = document.createElement('div');
    finRow.className = 'prow';
    const finNote = p.finishMinApplied ? '<br><span class="pmincolor">' + t('p_lissage_min') + '</span>' : '';
    finRow.innerHTML = '<div class="pl">' + t('p_finish') + finNote + '</div><span class="pv add">+' + eur(p.finishTotal) + '</span>';
    prows.appendChild(finRow);
  }

  // Délai
  const delayRate = opts.delay === 'pri' ? 0.10 : opts.delay === 'exp' ? 0.25 : 0;
  const delayPPTotal = p.pieceDetails.reduce((s, pd) => s + pd.basePP * delayRate * pd.qty, 0);
  if (delayPPTotal > 0) {
    const delayLabel = opts.delay === 'pri' ? t('p_delay') + ' (+10%)' : t('p_delay') + ' (+25%)';
    prows.appendChild(makeRow(delayLabel, '+' + eur(delayPPTotal), 'add'));
  }

  // Nettoyage
  const nettTotal = p.pieceDetails.reduce((s, pd) => s + (opts.nett ? 25 * pd.qty : 0), 0);
  if (nettTotal > 0) {
    prows.appendChild(makeRow(t('p_nett'), '+' + eur(nettTotal), 'add'));
  }

  // Couleur
  if (p.colorTotal > 0) {
    const colorRow = document.createElement('div');
    colorRow.className = 'prow';
    const colorNote = p.colorMinApplied ? '<br><span class="pmincolor">' + t('p_color_min') + '</span>' : '';
    colorRow.innerHTML = '<div class="pl">' + t('p_color') + ' ' + getColName(opts.col) + ' 2EUR/pc' + colorNote + '</div><span class="pv add">+' + eur(p.colorTotal) + '</span>';
    prows.appendChild(colorRow);
  }

  // Dossier
  if (p.dossierTotal > 0) {
    prows.appendChild(makeRow(t('p_dossier'), '+' + eur(p.dossierTotal), 'add'));
  }

  // Livraison
  if (p.livTotal > 0) {
    prows.appendChild(makeRow(t('p_delivery'), '+' + eur(p.livTotal), 'add'));
  }

  // Discount
  if (p.discRate > 0) {
    const discPct = Math.round(p.discRate * 100);
    prows.appendChild(makeRow(t('p_disc') + ' ' + discPct + '%', '-' + eur(p.discAmount), 'disc'));
  }

  // Totals — le sous-total HT affiche est le montant APRES remise (= p.ht)
  const rsubt = $('rsubt');
  if (p.discRate > 0) {
    $('psubt').textContent = eur(p.ht);
    show(rsubt);
  } else {
    hide(rsubt);
  }

  $('ptva').textContent = eur(p.tva);
  // HT = valeur principale (grand, gras, #004B32) ; TTC = secondaire (petit, #888)
  $('pht').innerHTML = p.ht.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2}) + '<sup>EUR</sup>';
  $('pttc').textContent = eur(p.ttc);
}

// ── Simulation ────────────────────────────────────────────────────────────────

function calcPiecePrice(piece, qty) {
  const opts = getOptions();
  const raw = piece.vol * 0.001;
  const delayRate = opts.delay === 'pri' ? 0.10 : opts.delay === 'exp' ? 0.25 : 0;
  const nettPP = opts.nett ? 25 : 0;

  function build(useMin) {
    const basePP = useMin ? Math.max(raw, MIN_PIECE) : raw;
    const pricePP = basePP * (1 + delayRate) + nettPP;
    const piecesTotal = pricePP * qty;
    const rawFinish = opts.fin === 'lissage' ? qty * 2 : 0;
    const finishTotal = rawFinish > 0 ? Math.max(rawFinish, 100) : 0;
    const rawColor = opts.col !== 'blanc' ? qty * 2 : 0;
    const colorTotal = rawColor > 0 ? Math.max(rawColor, 100) : 0;
    const dossierTotal = opts.dossier ? 15 : 0;
    const livTotal = opts.liv === 'j1' ? 15 : 0;
    const subBefore = piecesTotal + finishTotal + colorTotal + dossierTotal + livTotal;
    const discRate = getDiscount(subBefore);
    return { subBefore, ht: subBefore * (1 - discRate) };
  }

  const noMin = build(false);
  const useMin = raw < MIN_PIECE && noMin.subBefore < MIN_ORDER_THRESHOLD;
  const r = useMin ? build(true) : noMin;
  return { ht: r.ht, ttc: r.ht * 1.20 };
}

function makeSimTable(thQty, thHT, thTTC) {
  const wrap = document.createElement('div');
  wrap.style.overflowX = 'auto';
  const table = document.createElement('table');
  const thead = document.createElement('thead');
  thead.innerHTML = '<tr><th>' + thQty + '</th><th>' + thHT + '</th><th class="sim-ttc-th">' + thTTC + '</th></tr>';
  table.appendChild(thead);
  const tbody = document.createElement('tbody');
  table.appendChild(tbody);
  wrap.appendChild(table);
  return { wrap, tbody };
}

function renderSim() {
  if (!pieces.length) return;
  const container = $('simContent');
  container.innerHTML = '';
  const multi = pieces.length > 1;
  const thQty = t('s_qty'); const thHT = t('s_ht'); const thTTC = t('s_ttc');

  if (!multi) {
    const currentQty = Math.max(1, parseInt($('qty').value) || 1);
    const { wrap, tbody } = makeSimTable(thQty, thHT, thTTC);
    SIM_QTYS.forEach(q => {
      const p = calcPrice(q);
      if (!p) return;
      const tr = document.createElement('tr');
      if (q === currentQty) tr.className = 'active-row';
      tr.innerHTML = '<td>' + q + '</td><td class="sim-ht">' + eur(p.ht) + '</td><td class="sim-ttc">' + eur(p.ttc) + '</td>';
      tr.addEventListener('click', () => { $('qty').value = q; refresh(); renderSim(); });
      tbody.appendChild(tr);
    });
    container.appendChild(wrap);
  } else {
    pieces.forEach((piece, idx) => {
      const title = document.createElement('div');
      title.className = 'sim-piece-title';
      const name = piece.name.replace(/\.stl$/i, '');
      title.textContent = name.length > 30 ? name.slice(0, 27) + '…' : name;
      container.appendChild(title);
      const { wrap, tbody } = makeSimTable(thQty, thHT, thTTC);
      SIM_QTYS.forEach(q => {
        const pp = calcPiecePrice(piece, q);
        const tr = document.createElement('tr');
        if (q === (piece.qty || 1)) tr.className = 'active-row';
        tr.innerHTML = '<td>' + q + '</td><td class="sim-ht">' + eur(pp.ht) + '</td><td class="sim-ttc">' + eur(pp.ttc) + '</td>';
        tr.addEventListener('click', () => {
          pieces[idx].qty = q;
          renderPiecesList();
          refresh();
          renderSim();
        });
        tbody.appendChild(tr);
      });
      container.appendChild(wrap);
    });
  }
}

const MB = 1024 * 1024;
const MAX_FILE_SIZE = 50 * MB;
const MAX_FILES = 10;
const MAX_TOTAL_SIZE = 150 * MB;

async function processFiles(files) {
  if (!files || !files.length) return;
  const stlFiles = Array.from(files).filter(f => f.name.toLowerCase().endsWith('.stl'));
  if (!stlFiles.length) {
    showErr(t('err_format'));
    return;
  }
  // ── Limites fichiers (cumul avec les pieces deja chargees) ──
  if (pieces.length + stlFiles.length > MAX_FILES) {
    showErr(t('err_too_many'));
    return;
  }
  if (stlFiles.some(f => f.size > MAX_FILE_SIZE)) {
    showErr(t('err_file_big'));
    return;
  }
  const existingBytes = pieces.reduce((s, p) => s + (p.buf ? p.buf.byteLength : 0), 0);
  const newBytes = stlFiles.reduce((s, f) => s + f.size, 0);
  if (existingBytes + newBytes > MAX_TOTAL_SIZE) {
    showErr(t('err_total_big'));
    return;
  }
  hide($('err'));
  hide($('dz'));
  setParseProgress(0);
  show($('ps'));
  hide($('err'));

  // Progression repartie sur les N fichiers : lecture (70 % de la part de
  // chaque fichier) puis parsing du volume (30 %). La barre reste affichee
  // jusqu'a addPieces, qui declenche viewer 3D + prix.
  const total = stlFiles.length;
  const loaded = [];
  for (let i = 0; i < total; i++) {
    const file = stlFiles[i];
    const base = i / total;
    try {
      const buf = await readFileAsBuffer(file, frac => {
        setParseProgress((base + (frac * 0.7) / total) * 100);
      });
      setParseProgress((base + 0.7 / total) * 100);
      const v = getVol(buf);
      if (!isFinite(v) || v <= 0) {
        showErr(t('err_vol'));
        resetDrop();
        return;
      }
      loaded.push({ name: file.name, vol: v, buf });
      setParseProgress(((i + 1) / total) * 100);
    } catch(ex) {
      showErr(t('err_corrupt') + ex.message);
      resetDrop();
      return;
    }
  }

  setParseProgress(100);
  hide($('ps'));
  show($('dz'));
  $('fi').value = '';
  addPieces(loaded);
}

function readFileAsBuffer(file, onProgress) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onprogress = e => {
      if (onProgress && e.lengthComputable) onProgress(e.loaded / e.total);
    };
    r.onload = e => { if (onProgress) onProgress(1); resolve(e.target.result); };
    r.onerror = () => reject(new Error(t('err_read')));
    r.readAsArrayBuffer(file);
  });
}

function setParseProgress(pct) {
  const bar = $('psBar');
  if (bar) bar.style.width = Math.max(0, Math.min(100, pct)) + '%';
}

function showErr(msg) { $('err').textContent = msg; show($('err')); }
function resetDrop() { show($('dz')); hide($('ps')); setParseProgress(0); }

function resetAll() {
  cleanupViewer();
  pieces = [];

  document.querySelectorAll('.unit-btn').forEach(b => b.classList.toggle('active', b.dataset.unit === 'mm'));

}

// ── PDF helpers (ASCII-safe strings for jsPDF) ───────────────────────────────

function pdfStr(s) {
  // Replace accented chars and non-ASCII for jsPDF compatibility
  var map = {
    0xE0:'a',0xE2:'a',0xE4:'a', 0xE9:'e',0xE8:'e',0xEA:'e',0xEB:'e',
    0xEE:'i',0xEF:'i', 0xF4:'o',0xF6:'o', 0xF9:'u',0xFB:'u',0xFC:'u',
    0xE7:'c', 0xF1:'n',
    0xC0:'A',0xC2:'A',0xC4:'A', 0xC9:'E',0xC8:'E',0xCA:'E',0xCB:'E',
    0xCE:'I',0xCF:'I', 0xD4:'O',0xD6:'O', 0xD9:'U',0xDB:'U',0xDC:'U',
    0xC7:'C', 0xD1:'N',
    0xB3:'3' // superscript 3
  };
  var out = '';
  for (var i = 0; i < s.length; i++) {
    var code = s.charCodeAt(i);
    if (map[code] !== undefined) { out += map[code]; }
    else if (code >= 0x20 && code <= 0x7E) { out += s[i]; }
    // else: skip (non-breaking spaces, other non-ASCII)
  }
  return out;
}
function fvolPDF(v) { return Math.round(v).toString(); }
function eurPDF(v)  { return v.toFixed(2) + ' EUR'; }

  rows.push([pdfStr(t('p_base')) + (p.minApplied ? ' *' : ''), eurPDF(p.piecesTotal)]);
  if (p.finishTotal > 0) rows.push([pdfStr(t('p_finish')) + (p.finishMinApplied ? ' *' : ''), '+' + eurPDF(p.finishTotal)]);
  if (p.colorTotal > 0) rows.push([pdfStr(t('p_color') + ' ' + getColName(opts.col)) + (p.colorMinApplied ? ' *' : ''), '+' + eurPDF(p.colorTotal)]);

  // Delay
  const pdfDelayRate = opts.delay === 'pri' ? 0.10 : opts.delay === 'exp' ? 0.25 : 0;
  const delayPPTotal = p.pieceDetails.reduce((s, pd) => s + pd.basePP * pdfDelayRate * pd.qty, 0);
  if (delayPPTotal > 0) rows.push([pdfStr(t('p_delay')), '+' + eurPDF(delayPPTotal)]);

  // Nett
  const nettTotalPDF = p.pieceDetails.reduce((s, pd) => s + (opts.nett ? 25 * pd.qty : 0), 0);
  if (nettTotalPDF > 0) rows.push([pdfStr(t('p_nett')), '+' + eurPDF(nettTotalPDF)]);

  if (p.dossierTotal > 0) rows.push([pdfStr(t('p_dossier')), '+' + eurPDF(p.dossierTotal)]);
  if (p.livTotal > 0) rows.push([pdfStr(t('p_delivery')), '+' + eurPDF(p.livTotal)]);
  if (p.discRate > 0) rows.push([pdfStr(t('p_disc')) + ' ' + Math.round(p.discRate * 100) + '%', '-' + eurPDF(p.discAmount)]);

  // Table header
  doc.setFillColor(...green);
  doc.rect(12, y, W - 24, 8, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.setTextColor(...white);
  doc.text(pdfStr(t('pdf_designation')), 16, y + 5.5);
  doc.text(pdfStr(t('pdf_amount')), W - 16, y + 5.5, { align: 'right' });
  y += 8;

  rows.forEach((row, i) => {
    doc.setFillColor(i % 2 === 0 ? 250 : 245, i % 2 === 0 ? 250 : 245, i % 2 === 0 ? 250 : 245);
    doc.rect(12, y, W - 24, 7, 'F');
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8.5);
    doc.setTextColor(...text);
    doc.text(row[0], 16, y + 5);
    doc.setFont('helvetica', 'normal');
    doc.text(row[1], W - 16, y + 5, { align: 'right' });
    y += 7;
  });

  y += 4;

  // TVA (ligne secondaire)
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(...muted);
  doc.text(pdfStr(t('p_tva')), W - 70, y);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(...text);
  doc.text(eurPDF(p.tva), W - 16, y, { align: 'right' });
  y += 9;

  // HT box — valeur principale mise en avant
  doc.setFillColor(...green);
  doc.roundedRect(12, y, W - 24, 14, 4, 4, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(10);
  doc.setTextColor(...lime);
  doc.text(pdfStr(t('p_total_ht')), 20, y + 9);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(14);
  doc.setTextColor(...white);
  doc.text(eurPDF(p.ht), W - 16, y + 9, { align: 'right' });
  y += 18;

  // TTC — ligne secondaire sous le HT
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(...muted);
  doc.text(pdfStr(t('p_ttc')) + ' : ' + eurPDF(p.ttc), W - 16, y, { align: 'right' });
  y += 8;

  // Notes
  if (p.minApplied) {
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7.5);
    doc.setTextColor(...muted);
    doc.text(pdfStr('* ' + t('p_min_applied')), 15, y);
    y += 5;
  }
  if (p.colorMinApplied) {
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7.5);
    doc.setTextColor(...muted);
    doc.text(pdfStr('* ' + t('p_color_min')), 15, y);
    y += 5;
  }
  if (p.finishMinApplied) {
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7.5);
    doc.setTextColor(...muted);
    doc.text(pdfStr('* ' + t('p_lissage_min')), 15, y);
    y += 5;
  }

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(7.5);
  doc.setTextColor(...muted);
  doc.text(pdfStr(t('p_note')), 15, y);
  y += 8;

  // Contact section
  doc.setDrawColor(...green);
  doc.setLineWidth(0.3);
  doc.line(12, y, W - 12, y);
  y += 7;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(...text);
  doc.text(pdfStr(t('contact_text')) + ' :', 15, y);
  y += 6;
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(...orange);
  doc.text('3Dprinting@oneortho-medical.com', 15, y);

  // Footer
  doc.setFillColor(...green);
  doc.rect(0, 287, W, 10, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.setTextColor(...white);
  doc.text('ONE', 15, 293.5);
  const oneWf = doc.getTextWidth('ONE');
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(...orange);
  doc.text(' PRINT', 15 + oneWf, 293.5);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(200, 200, 200);
  doc.text('OneOrtho Medical - PA2200 Nylon SLS', W / 2, 293.5, { align: 'center' });
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(...lime);
  doc.text(QUOTE_NUM, W - 15, 293.5, { align: 'right' });

  doc.save('ONEPRINT-' + QUOTE_NUM + '.pdf');
}

// ── Panier (localStorage, sans backend pour l'instant) ──────────────────────
const CART_KEY = 'oneprint_cart';

function loadCart() {
  try { return JSON.parse(localStorage.getItem(CART_KEY)) || []; }
  catch (e) { return []; }
}
function saveCart(cart) {
  try { localStorage.setItem(CART_KEY, JSON.stringify(cart)); } catch (e) {}
}

// IndexedDB : binaires STL conserves localement (partage same-origin avec l'app
// Next, qui les lit au checkout pour l'upload). Meme base/store que lib/stlStore.
function idbOpen() {
  return new Promise((res, rej) => {
    const r = indexedDB.open('oneprint', 1);
    r.onupgradeneeded = () => {
      const d = r.result;
      if (!d.objectStoreNames.contains('stl')) d.createObjectStore('stl');
    };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
function idbPutStl(key, buf) {
  return idbOpen().then(db => new Promise((res, rej) => {
    const tx = db.transaction('stl', 'readwrite');
    tx.objectStore('stl').put(buf, key);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  }));
}
function cartItemCount(cart) {
  // total des pieces (somme des quantites de toutes les lignes du panier)
  return cart.reduce((s, it) =>
    s + (it.pieces || []).reduce((q, p) => q + (p.quantite || 1), 0), 0);
}
function updateCartCount() {
  const n = cartItemCount(loadCart());
  const el = $('cartCount');
  const pill = $('cartPill');
  if (el) el.textContent = n;
  if (pill) pill.classList.toggle('has-items', n > 0);
}

// Construit une ligne de panier alignee sur le schema Supabase (devis + devis_pieces)
function buildCartItem() {
  if (!pieces.length) return null;
  const opts = getOptions();
  const multi = pieces.length > 1;
  const p = multi ? calcPrice() : calcPrice(opts.qty);
  if (!p) return null;
  return {
    id: QUOTE_NUM + '-' + (loadCart().length + 1),
    numero: QUOTE_NUM,
    langue: currentLang,
    nature_application: opts.app,
    delai: opts.delay,
    livraison: opts.liv,
    nettoyage: !!opts.nett,
    dossier_lot: !!opts.dossier,
    teinture_total: +(p.colorTotal || 0).toFixed(2),
    remise: +(p.discAmount || 0).toFixed(2),
    montant_ht: +p.ht.toFixed(2),
    tva: +p.tva.toFixed(2),
    montant_ttc: +p.ttc.toFixed(2),
    pieces: p.pieceDetails.map(pd => ({
      nom_fichier: pd.name,
      volume_mm3: Math.round(pd.vol),
      quantite: pd.qty,
      prix_ht: +(pd.pricePP * pd.qty).toFixed(2),
      finition: opts.fin,
      couleur: opts.col
    }))
  };
}

// Session Supabase : le client Next stocke la session en localStorage
// (cle sb-<ref>-auth-token). Meme origine => l'iframe peut la lire.
function authTokenKeys() {
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('sb-') && k.endsWith('-auth-token')) keys.push(k);
  }
  return keys;
}
// Renvoie la session active (avec user/user_metadata) ou null.
function getAuthSession() {
  try {
    for (const k of authTokenKeys()) {
      const v = JSON.parse(localStorage.getItem(k) || 'null');
      const s = v && v.currentSession ? v.currentSession : v;
      if (s && s.access_token && (!s.expires_at || s.expires_at * 1000 > Date.now())) return s;
    }
  } catch (e) {}
  return null;
}
function isLoggedIn() { return !!getAuthSession(); }

// Textes de la modale "connexion requise" (i18n local aux 6 langues de l'app).
const AUTH_I18N = {
  fr: { title: "Connexion requise pour commander", body: "Votre configuration a ete ajoutee au panier et sera conservee. Connectez-vous ou creez un compte pour finaliser votre commande.", login: "Se connecter", signup: "Creer un compte", guest: "Continuer sans compte" },
  en: { title: "Sign in to place your order", body: "Your configuration has been added to the cart and will be kept. Sign in or create an account to complete your order.", login: "Sign in", signup: "Create an account", guest: "Continue without an account" },
  es: { title: "Inicia sesion para pedir", body: "Tu configuracion se ha anadido al carrito y se conservara. Inicia sesion o crea una cuenta para completar el pedido.", login: "Iniciar sesion", signup: "Crear una cuenta", guest: "Continuar sin cuenta" },
  it: { title: "Accedi per ordinare", body: "La tua configurazione e stata aggiunta al carrello e verra conservata. Accedi o crea un account per completare l'ordine.", login: "Accedi", signup: "Crea un account", guest: "Continua senza account" },

  pt: { title: "Inicie sessao para encomendar", body: "A sua configuracao foi adicionada ao carrinho e sera mantida. Inicie sessao ou crie uma conta para concluir o pedido.", login: "Iniciar sessao", signup: "Criar uma conta", guest: "Continuar sem conta" },
};
// Navigue la page parente Next (meme origine que cet iframe). On vise
// window.parent et non window.top : en prod l'Espace client est lui-meme
// embarque en iframe dans le site OneOrtho (origine differente), or ecrire
// window.top.location est alors bloque (cross-origin) et resoudrait "/panier"
// sur la mauvaise racine. window.parent reste l'app Next, accessible.
function goTop(path) { (window.parent || window).location.href = path; }
function showAuthModal() {
  const tr = AUTH_I18N[currentLang] || AUTH_I18N.fr;
  $('authTitle').textContent = tr.title;
  $('authBody').textContent = tr.body;
  $('authLogin').textContent = tr.login;
  $('authSignup').textContent = tr.signup;
  $('authGuest').textContent = tr.guest;
  const m = $('authModal'); if (m) m.style.display = 'flex';
}
function hideAuthModal() { const m = $('authModal'); if (m) m.style.display = 'none'; }

async function addToCart() {
  const item = buildCartItem();
  if (!item) return;
  // Persiste chaque binaire STL en IndexedDB et tague la piece (stl_key).
  // L'app Next lira ces binaires au checkout pour les uploader vers Storage.
  try {
    for (let i = 0; i < item.pieces.length; i++) {
      const buf = pieces[i] && pieces[i].buf;
      if (buf) {
        const key = item.id + '/' + item.pieces[i].nom_fichier;
        await idbPutStl(key, buf);
        item.pieces[i].stl_key = key;
      }
    }
  } catch (e) { /* IndexedDB indisponible : on garde au moins les metadonnees */ }
  const cart = loadCart();
  cart.push(item);
  saveCart(cart);
  updateCartCount();
  // retour visuel
  const pill = $('cartPill');
  if (pill) { pill.classList.remove('cart-flash'); void pill.offsetWidth; pill.classList.add('cart-flash'); }
  const btn = $('btnCart');
  if (btn) {
    btn.textContent = t('cart_added');
    setTimeout(() => { btn.textContent = t('cart_add'); }, 1400);
  }
  // Connecte : on ouvre le panier. Non connecte : on propose connexion/inscription
  // (le devis est deja dans le panier, donc conserve apres connexion).
  if (isLoggedIn()) goTop('/panier');
  else showAuthModal();
}

// ── Pastille utilisateur (initiales + dropdown), alignee sur EspaceHeader ─────
const PILL_TITLES = new Set(['dr','dr.','pr','pr.','m','m.','mr','mr.','mme','mme.','mlle','mlle.']);
function pillInitials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/).filter(p => p && !PILL_TITLES.has(p.toLowerCase())).slice(0, 2);
  return parts.map(p => (p[0] || '').toUpperCase()).join('') || '?';
}
function pillFullName(session) {
  const u = session && session.user ? session.user : {};
  const m = u.user_metadata || {};
  return m.nom || m.raison_sociale || u.email || '';
}
function setUserMenuOpen(open) {
  const menu = $('userMenu'), pill = $('userPill');
  if (!menu || !pill) return;
  menu.hidden = !open;
  pill.setAttribute('aria-expanded', open ? 'true' : 'false');
}
// Met a jour l'affichage de la pastille selon la session courante. Appele a
// l'init ET sur l'evenement 'storage' : si l'utilisateur se connecte/deconnecte
// dans un autre onglet, la pastille de l'iframe reste a jour.
function renderUserPill() {
  const pill = $('userPill');
  if (!pill) return;
  const session = getAuthSession();
  const initialsEl = $('userPillInitials'), guestEl = $('userPillGuest');
  const tooltip = $('userTooltip'), head = $('userMenuHead');

  if (session) {
    const full = pillFullName(session);
    pill.classList.remove('guest');
    initialsEl.textContent = pillInitials(full);
    initialsEl.style.display = '';
    guestEl.style.display = 'none';
    tooltip.textContent = full;
    head.textContent = full;
    pill.setAttribute('aria-label', full || 'Compte');
  } else {
    pill.classList.add('guest');
    initialsEl.textContent = '';
    initialsEl.style.display = 'none';
    guestEl.style.display = '';
    tooltip.textContent = '';
    setUserMenuOpen(false);
  }
}

function initUserPill() {
  const wrap = $('userPillWrap'), pill = $('userPill');
  if (!wrap || !pill) return;

  renderUserPill();

  pill.addEventListener('click', (e) => {
    e.stopPropagation();
    // Etat lu en direct (pas fige a l'init) : non connecte -> connexion,
    // connecte -> ouvre/ferme le menu.
    if (!getAuthSession()) { goTop('/connexion'); return; }
    setUserMenuOpen($('userMenu').hidden);
  });

  $('umAccount').addEventListener('click', () => { setUserMenuOpen(false); goTop('/mon-compte'); });
  $('umOrders').addEventListener('click', () => { setUserMenuOpen(false); goTop('/mes-commandes'); });
  $('umLogout').addEventListener('click', () => {
    // Deconnexion locale : on retire la session Supabase de ce navigateur puis
    // on renvoie vers la connexion (meme effet que signOut cote app Next).
    try { authTokenKeys().forEach(k => localStorage.removeItem(k)); } catch (e) {}
    renderUserPill();
    goTop('/connexion');
  });

  // Fermeture au clic exterieur / Echap.
  document.addEventListener('click', (e) => {
    if (!wrap.contains(e.target)) setUserMenuOpen(false);
  });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') setUserMenuOpen(false); });
  // Resync quand la session change dans un autre onglet.
  window.addEventListener('storage', renderUserPill);
}
initUserPill();
