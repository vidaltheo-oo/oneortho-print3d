<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
</helmet>
<div style="font-family:'DM Sans',system-ui,sans-serif;color:#1C1C1A;display:flex;flex-direction:column;height:100%;background:#fff;">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:20px 22px 16px;border-bottom:1px solid #E2DED2;flex:none;">
    <div style="display:flex;align-items:center;gap:11px;min-width:0;">
      <span style="width:36px;height:36px;border-radius:9px;background:#F0F7EC;color:#004B32;display:flex;align-items:center;justify-content:center;flex:none;"><svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2.5h6l4 4V17a.5.5 0 0 1-.5.5h-9A.5.5 0 0 1 5 17z"/><path d="M11 2.5v4h4"/></svg></span>
      <div style="min-width:0;"><div style="font-family:'Sora';font-weight:700;font-size:15px;color:#004B32;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ data.name }}</div><div style="font-size:11.5px;color:#888;">PA2200 Nylon SLS</div></div>
    </div>
    <button onClick="{{ onClose }}" style="width:32px;height:32px;border-radius:9px;border:1px solid #E2DED2;background:#fff;color:#666;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;" style-hover="background:#F4F1E7;color:#1A1A1A;"><svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 5l10 10M15 5L5 15"/></svg></button>
  </div>

  <div style="padding:18px 22px;display:flex;flex-direction:column;gap:18px;overflow-y:auto;">
    <!-- 3D preview placeholder -->
    <div style="position:relative;height:240px;border-radius:14px;overflow:hidden;background:repeating-linear-gradient(135deg,#EFE7D6 0 12px,#E7DEC9 12px 24px);border:1px solid #E2DED2;display:flex;align-items:center;justify-content:center;">
      <div style="text-align:center;">
        <svg width="46" height="46" viewBox="0 0 60 60" fill="none" style="margin:0 auto 10px;display:block;"><polygon points="30,6 54,19 30,32 6,19" fill="rgba(170,230,110,.25)" stroke="#004B32" stroke-width="2" stroke-linejoin="round"/><polygon points="6,19 30,32 30,54 6,41" fill="rgba(0,75,50,.1)" stroke="#004B32" stroke-width="2" stroke-linejoin="round"/><polygon points="54,19 30,32 30,54 54,41" fill="rgba(0,75,50,.06)" stroke="#004B32" stroke-width="2" stroke-linejoin="round"/></svg>
        <div style="font-family:ui-monospace,'SFMono-Regular',Menlo,monospace;font-size:11px;color:#9a8f73;letter-spacing:.5px;">aperçu .stl — glisser pour pivoter</div>
      </div>
      <span style="position:absolute;bottom:10px;right:12px;font-family:'Sora';font-size:10px;font-weight:600;color:#9a8f73;background:rgba(255,255,255,.7);padding:3px 9px;border-radius:99px;">three.js</span>
    </div>

    <!-- metadata -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;">
      <div style="background:#FAF8F0;border:1px solid #E2DED2;border-radius:12px;padding:13px 14px;"><div style="font-size:11px;color:#9aa39e;">Volume</div><div style="font-family:'Sora';font-size:15px;font-weight:700;margin-top:3px;">{{ data.volume }}</div></div>
      <div style="background:#FAF8F0;border:1px solid #E2DED2;border-radius:12px;padding:13px 14px;"><div style="font-size:11px;color:#9aa39e;">Dimensions</div><div style="font-family:'Sora';font-size:15px;font-weight:700;margin-top:3px;">{{ data.dims }}</div></div>
      <div style="background:#FAF8F0;border:1px solid #E2DED2;border-radius:12px;padding:13px 14px;"><div style="font-size:11px;color:#9aa39e;">Finition</div><div style="font-size:13.5px;font-weight:600;margin-top:4px;">{{ data.finition }}</div></div>
      <div style="background:#FAF8F0;border:1px solid #E2DED2;border-radius:12px;padding:13px 14px;"><div style="font-size:11px;color:#9aa39e;">Teinte</div><div style="display:flex;align-items:center;gap:7px;margin-top:4px;"><span style="{{ data.teinteDot }}"></span><span style="font-size:13.5px;font-weight:600;">{{ data.teinte }}</span></div></div>
    </div>

    <!-- linked -->
    <div>
      <div style="font-size:11px;color:#9aa39e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px;">Rattaché à</div>
      <div style="border:1px solid #E2DED2;border-radius:13px;overflow:hidden;">
        <div style="display:flex;align-items:center;gap:11px;padding:12px 14px;"><span style="width:30px;height:30px;border-radius:8px;background:#F0F7EC;color:#004B32;display:flex;align-items:center;justify-content:center;flex:none;"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M6 2.5h6.2L18 8.3V19.5A2 2 0 0 1 16 21.5H6A2 2 0 0 1 4 19.5V4.5A2 2 0 0 1 6 2.5Z"/><path d="M12.2 2.5 18 8.3h-4.2a1.6 1.6 0 0 1-1.6-1.6Z" fill-opacity=".4"/></svg></span><div style="flex:1;min-width:0;"><div style="font-size:11px;color:#9aa39e;">Devis</div><div style="font-size:13px;font-weight:600;color:#004B32;">{{ data.devis }}</div></div></div>
        <div style="display:flex;align-items:center;gap:11px;padding:12px 14px;border-top:1px solid #E2DED2;"><span style="width:30px;height:30px;border-radius:8px;background:#004B32;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:none;">{{ data.initials }}</span><div style="flex:1;min-width:0;"><div style="font-size:11px;color:#9aa39e;">Client</div><div style="font-size:13px;font-weight:600;">{{ data.client }}</div></div></div>
      </div>
    </div>

    <!-- actions -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;">
      <button style="display:flex;align-items:center;justify-content:center;gap:7px;background:#004B32;color:#fff;font-size:13px;font-weight:700;padding:12px;border:none;border-radius:99px;cursor:pointer;" style-hover="background:#00603f;"><svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3v9M6.5 9 10 12.5 13.5 9M4 15h12"/></svg>Télécharger</button>
      <button onClick="{{ onViewDevis }}" style="display:flex;align-items:center;justify-content:center;gap:7px;background:#fff;border:1px solid rgba(0,75,50,0.2);color:#004B32;font-size:13px;font-weight:600;padding:12px;border-radius:99px;cursor:pointer;" style-hover="background:#F0F7EC;">Voir le devis</button>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:500,&quot;height&quot;:840},&quot;data&quot;:{&quot;editor&quot;:null},&quot;onClose&quot;:{&quot;editor&quot;:null},&quot;onViewDevis&quot;:{&quot;editor&quot;:null}}"></script>
</body>
</html>
