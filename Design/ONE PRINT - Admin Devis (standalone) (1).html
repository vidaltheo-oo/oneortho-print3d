  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:13px;font-weight:600;padding:8px 16px;border-radius:99px;cursor:pointer;\" style-hover=\"background:#004B32;color:#fff;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10 3v9M6.5 9 10 12.5 13.5 9M4 15h12\"><\u002Fpath><\u002Fsvg>Export CSV<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"font-size:12.5px;color:#9aa39e;margin:-6px 2px -4px;\">{{ countLabel }}<\u002Fdiv>\n\n      <!-- TABLE -->\n      <div style=\"background:#fff;border:1px solid rgba(0,75,50,0.08);border-radius:16px;overflow:hidden;box-shadow:0 1px 2px rgba(0,75,50,.04),0 18px 40px -30px rgba(0,75,50,.4);position:relative;z-index:1;\">\n        <div style=\"overflow-x:auto;\">\n          <div style=\"min-width:1080px;\">\n            <div style=\"display:grid;grid-template-columns:170px 76px 1.5fr 64px 1.15fr 110px 110px 1.1fr 104px;background:#004B32;color:#fff;font-size:12px;font-weight:600;letter-spacing:.2px;\">\n              <div onclick=\"{{ sorts.id }}\" style=\"padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:5px;\" style-hover=\"color:#AAE66E;\">N° devis<span style=\"color:#AAE66E;font-size:10px;\">{{ arrows.id }}<\u002Fspan><\u002Fdiv>\n              <div onclick=\"{{ sorts.date }}\" style=\"padding:14px 8px;cursor:pointer;display:flex;align-items:center;gap:5px;\" style-hover=\"color:#AAE66E;\">Date<span style=\"color:#AAE66E;font-size:10px;\">{{ arrows.date }}<\u002Fspan><\u002Fdiv>\n              <div onclick=\"{{ sorts.client }}\" style=\"padding:14px 8px;cursor:pointer;display:flex;align-items:center;gap:5px;\" style-hover=\"color:#AAE66E;\">Client<span style=\"color:#AAE66E;font-size:10px;\">{{ arrows.client }}<\u002Fspan><\u002Fdiv>\n              <div onclick=\"{{ sorts.files }}\" style=\"padding:14px 8px;cursor:pointer;display:flex;align-items:center;gap:5px;\" style-hover=\"color:#AAE66E;\">STL<span style=\"color:#AAE66E;font-size:10px;\">{{ arrows.files }}<\u002Fspan><\u002Fdiv>\n              <div onclick=\"{{ sorts.nature }}\" style=\"padding:14px 8px;cursor:pointer;display:flex;align-items:center;gap:5px;\" style-hover=\"color:#AAE66E;\">Nature<span style=\"color:#AAE66E;font-size:10px;\">{{ arrows.nature }}<\u002Fspan><\u002Fdiv>\n              <div onclick=\"{{ sorts.montant }}\" style=\"padding:14px 8px;cursor:pointer;display:flex;align-items:center;gap:5px;\" style-hover=\"color:#AAE66E;\">Montant HT<span style=\"color:#AAE66E;font-size:10px;\">{{ arrows.montant }}<\u002Fspan><\u002Fdiv>\n              <div onclick=\"{{ sorts.delai }}\" style=\"padding:14px 8px;cursor:pointer;display:flex;align-items:center;gap:5px;\" style-hover=\"color:#AAE66E;\">Délai<span style=\"color:#AAE66E;font-size:10px;\">{{ arrows.delai }}<\u002Fspan><\u002Fdiv>\n              <div onclick=\"{{ sorts.statut }}\" style=\"padding:14px 8px;cursor:pointer;display:flex;align-items:center;gap:5px;\" style-hover=\"color:#AAE66E;\">Statut<span style=\"color:#AAE66E;font-size:10px;\">{{ arrows.statut }}<\u002Fspan><\u002Fdiv>\n              <div style=\"padding:14px 18px;text-align:right;\">Actions<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ hasResults }}\" hint-placeholder-val=\"{{ true }}\">\n              <sc-for list=\"{{ quotes }}\" as=\"q\" hint-placeholder-count=\"9\">\n                <div onclick=\"{{ openModal }}\" style=\"{{ q.rowStyle }}\" style-hover=\"background:#F0F7EC;\">\n                  <div style=\"padding:14px 18px;font-weight:600;font-size:12.5px;color:#004B32;\">{{ q.id }}<\u002Fdiv>\n                  <div style=\"padding:14px 8px;font-size:13px;color:#555;\">{{ q.date }}<\u002Fdiv>\n                  <div style=\"padding:11px 8px;\"><div style=\"font-size:13.5px;font-weight:600;\">{{ q.client }}<\u002Fdiv><div style=\"font-size:11.5px;color:#9aa39e;\">{{ q.email }}<\u002Fdiv><\u002Fdiv>\n                  <div style=\"padding:14px 8px;font-size:13px;color:#555;\">{{ q.files }}<\u002Fdiv>\n                  <div style=\"padding:11px 8px;\"><span style=\"{{ q.natureStyle }}\">{{ q.nature }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"padding:14px 8px;font-size:13.5px;font-weight:600;\">{{ q.montant }}<\u002Fdiv>\n                  <div style=\"padding:11px 8px;\"><span style=\"{{ q.delaiStyle }}\">{{ q.delai }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"padding:11px 8px;\"><span style=\"{{ q.statusStyle }}\">{{ q.statut }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"padding:10px 18px;display:flex;gap:7px;justify-content:flex-end;\">\n                    <button onclick=\"{{ openModal }}\" title=\"Voir\" style=\"width:32px;height:32px;border-radius:9px;border:1px solid rgba(0,75,50,.14);background:#fff;color:#004B32;display:flex;align-items:center;justify-content:center;cursor:pointer;\" style-hover=\"background:#004B32;color:#fff;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\"><path d=\"M2 10s3-5 8-5 8 5 8 5-3 5-8 5-8-5-8-5z\"><\u002Fpath><circle cx=\"10\" cy=\"10\" r=\"2.2\"><\u002Fcircle><\u002Fsvg><\u002Fbutton>\n                    <button title=\"PDF\" style=\"width:32px;height:32px;border-radius:9px;border:1px solid rgba(0,75,50,.14);background:#fff;color:#7a8a82;display:flex;align-items:center;justify-content:center;cursor:pointer;\" style-hover=\"background:#F0F7EC;color:#004B32;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10 3v9M6.5 9 10 12.5 13.5 9M4 15h12\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                    <button title=\"Valider\" style=\"width:32px;height:32px;border-radius:9px;border:1px solid rgba(0,75,50,.14);background:#fff;color:#7a8a82;display:flex;align-items:center;justify-content:center;cursor:pointer;\" style-hover=\"background:#AAE66E;color:#004B32;border-color:#AAE66E;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 10.5 8 14l8-8.5\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- EMPTY STATE -->\n        <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;padding:64px 24px;\">\n            <div style=\"width:64px;height:64px;border-radius:18px;background:#F0F7EC;color:#004B32;display:flex;align-items:center;justify-content:center;margin-bottom:18px;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><line x1=\"16.5\" y1=\"16.5\" x2=\"21\" y2=\"21\"><\u002Fline><line x1=\"8\" y1=\"11\" x2=\"14\" y2=\"11\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n            <div style=\"font-family:'Sora';font-weight:600;font-size:17px;\">Aucun devis trouvé<\u002Fdiv>\n            <div style=\"font-size:13.5px;color:#888;margin-top:6px;max-width:340px;line-height:1.5;\">Aucun devis ne correspond à votre recherche ou à ces filtres. Essayez d'élargir les critères.<\u002Fdiv>\n            <button onclick=\"{{ resetFilters }}\" style=\"margin-top:18px;display:flex;align-items:center;gap:7px;background:#004B32;color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border:none;border-radius:99px;cursor:pointer;\" style-hover=\"background:#00603f;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 10a6 6 0 1 1 1.8 4.3M4 10V6.5M4 10h3.5\"><\u002Fpath><\u002Fsvg>Réinitialiser les filtres<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- MODAL -->\n  <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeModal }}\" style=\"position:fixed;inset:0;z-index:1000;background:rgba(26,26,26,.42);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:flex-end;padding:24px;\">\n      <div onclick=\"{{ stop }}\" style=\"width:460px;max-height:calc(100vh - 48px);overflow-y:auto;background:#fff;border-radius:20px;box-shadow:0 40px 90px -24px rgba(0,0,0,.5);\">\n        <dc-import name=\"DevisDetail\" statut=\"{{ modalStatus }}\" closable=\"{{ true }}\" on-change-statut=\"{{ setModalStatus }}\" on-close=\"{{ closeModal }}\" hint-size=\"460px,100%\"><\u002Fdc-import>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1480,&quot;height&quot;:1000}}\">\nclass Component extends DCLogic {\n  state = { view: 'devis', openFilter: null, modalOpen: false, modalStatus: 'Validé', query: '', statusFilter: 'Tous', sortCol: 'date', sortDir: 'desc', hoverBar: -1 };\n\n  renderVals() {\n    const st = this.state;\n    const badge = (bg, fg) => ({\n      background: bg, color: fg, padding: '4px 12px', borderRadius: '999px',\n      fontSize: '12px', fontWeight: 600, whiteSpace: 'nowrap', display: 'inline-block',\n    });\n    const statusStyle = {\n      'Nouveau': badge('#FFF3E0', '#FF6C4F'), 'En cours': badge('#FFF8E1', '#B26A00'),\n      'Validé': badge('#E8F5E9', '#004B32'), 'Payé': badge('#AAE66E', '#004B32'),\n      'En production': badge('#E3F2FD', '#1565C0'), 'Expédié': badge('#F3E5F5', '#6A1B9A'),\n    };\n    const natureStyle = { 'DM': badge('#E8F5E9', '#004B32'), 'Prototype': badge('#F1F8E9', '#33691E'), 'Autre': badge('#ECEFF1', '#546E7A') };\n    const delaiStyle = { 'Standard': badge('#EEF1F0', '#5b6b66'), 'Priority': badge('#FFF8E1', '#B26A00'), 'Express': badge('#FFF3E0', '#FF6C4F') };\n\n    const raw = [\n      ['DEV-20260608-0042', '08/06', 'Clinique Saint-Roch', 'devis@st-roch.fr', 3, 'DM', '1 240 €', 'Express', 'Nouveau'],\n      ['DEV-20260607-0039', '07/06', 'Atelier Prothèse Lyon', 'contact@app-lyon.fr', 1, 'Prototype', '380 €', 'Standard', 'En cours'],\n      ['DEV-20260606-0037', '06/06', 'Dr. Mehdi Bouaziz', 'm.bouaziz@ortho.fr', 5, 'DM', '2 980 €', 'Priority', 'Validé'],\n      ['DEV-20260605-0031', '05/06', 'OrthoLab Genève', 'lab@ortholab.ch', 2, 'Prototype', '760 €', 'Standard', 'Payé'],\n      ['DEV-20260603-0028', '03/06', 'Hôpital Nord', 'achats@hop-nord.fr', 8, 'DM', '5 420 €', 'Priority', 'En production'],\n      ['DEV-20260601-0024', '01/06', 'MedStudio Paris', 'hello@medstudio.fr', 1, 'Autre', '210 €', 'Standard', 'Expédié'],\n      ['DEV-20260530-0019', '30/05', 'Clinique du Sport', 'devis@clinic-sport.fr', 4, 'DM', '1 890 €', 'Express', 'Validé'],\n      ['DEV-20260528-0014', '28/05', 'BioForm Toulouse', 'contact@bioform.fr', 2, 'Prototype', '540 €', 'Standard', 'Nouveau'],\n      ['DEV-20260526-0011', '26/05', 'Centre Ortho Lille', 'devis@ortho-lille.fr', 6, 'DM', '3 310 €', 'Priority', 'Payé'],\n    ];\n    const base = raw.map((r) => ({\n      id: r[0], date: r[1], client: r[2], email: r[3], files: r[4], nature: r[5], montant: r[6], delai: r[7], statut: r[8],\n      statusStyle: statusStyle[r[8]], natureStyle: natureStyle[r[5]], delaiStyle: delaiStyle[r[7]],\n    }));\n\n    // ----- filtering -----\n    const q = st.query.trim().toLowerCase();\n    let filtered = base.filter((row) => {\n      const okStatus = st.statusFilter === 'Tous' || row.statut === st.statusFilter;\n      const okQuery = !q || (row.id + ' ' + row.client + ' ' + row.email).toLowerCase().includes(q);\n      return okStatus && okQuery;\n    });\n\n    // ----- sorting -----\n    const natureRank = { 'DM': 0, 'Prototype': 1, 'Autre': 2 };\n    const delaiRank = { 'Standard': 0, 'Priority': 1, 'Express': 2 };\n    const statutRank = { 'Nouveau': 0, 'En cours': 1, 'Validé': 2, 'Payé': 3, 'En production': 4, 'Expédié': 5 };\n    const num = (s) => parseInt(String(s).replace(/[^0-9]/g, ''), 10) || 0;\n    const dval = (s) => { const p = s.split('/'); return Number(p[1]) * 31 + Number(p[0]); };\n    const keyOf = (row) => {\n      switch (st.sortCol) {\n        case 'id': return row.id;\n        case 'date': return dval(row.date);\n        case 'client': return row.client.toLowerCase();\n        case 'files': return row.files;\n        case 'nature': return natureRank[row.nature];\n        case 'montant': return num(row.montant);\n        case 'delai': return delaiRank[row.delai];\n        case 'statut': return statutRank[row.statut];\n        default: return 0;\n      }\n    };\n    filtered = filtered.slice().sort((a, b) => {\n      const va = keyOf(a), vb = keyOf(b);\n      const r = va < vb ? -1 : (va > vb ? 1 : 0);\n      return st.sortDir === 'asc' ? r : -r;\n    });\n\n    const quotes = filtered.map((row, i) => ({\n      ...row,\n      rowStyle: { display: 'grid', gridTemplateColumns: '170px 76px 1.5fr 64px 1.15fr 110px 110px 1.1fr 104px', alignItems: 'center', background: i % 2 === 0 ? '#FFFFFF' : '#FAF8F0', borderTop: i === 0 ? 'none' : '1px solid rgba(0,75,50,0.07)', cursor: 'pointer' },\n    }));\n\n    // sort handler + arrows\n    const sortBy = (col) => () => this.setState((s) => ({ sortCol: col, sortDir: s.sortCol === col ? (s.sortDir === 'asc' ? 'desc' : 'asc') : 'asc' }));\n    const cols = ['id', 'date', 'client', 'files', 'nature', 'montant', 'delai', 'statut'];\n    const sorts = {}, arrows = {};\n    cols.forEach((c) => { sorts[c] = sortBy(c); arrows[c] = st.sortCol === c ? (st.sortDir === 'asc' ? '▲' : '▼') : ''; });\n\n    // status pills\n    const pillList = ['Tous', 'Nouveau', 'En cours', 'Validé', 'Payé', 'En production', 'Expédié'];\n    const statusPills = pillList.map((label) => {\n      const active = st.statusFilter === label;\n      return {\n        label, onClick: () => this.setState({ statusFilter: label }),\n        style: active\n          ? { background: '#004B32', color: '#fff', fontSize: '13px', fontWeight: 600, padding: '8px 16px', borderRadius: '99px', cursor: 'pointer', whiteSpace: 'nowrap' }\n          : { background: '#fff', border: '1px solid rgba(0,75,50,.12)', color: '#3f5249', fontSize: '13px', padding: '8px 15px', borderRadius: '99px', cursor: 'pointer', whiteSpace: 'nowrap' },\n      };\n    });\n\n    const count = quotes.length;\n    const countLabel = count === 0 ? 'Aucun devis' : (count + ' devis' + (st.statusFilter !== 'Tous' ? ' · ' + st.statusFilter : '') + (q ? ' · « ' + st.query.trim() + ' »' : ''));\n\n    // ----- chart -----\n    const chartRaw = [['juil', 38], ['août', 31], ['sept', 44], ['oct', 52], ['nov', 47], ['déc', 58], ['janv', 54], ['févr', 63], ['mars', 59], ['avr', 71], ['mai', 77], ['juin', 86]];\n    const maxV = 100;\n    const chart = chartRaw.map((m, i) => {\n      const isCur = i === chartRaw.length - 1;\n      const isHover = st.hoverBar === i;\n      const showTip = isHover || (st.hoverBar === -1 && isCur);\n      return {\n        label: m[0], value: m[1],\n        onEnter: () => this.setState({ hoverBar: i }),\n        onLeave: () => this.setState({ hoverBar: -1 }),\n        barStyle: { width: '100%', height: (m[1] / maxV * 196) + 'px', background: isCur ? '#AAE66E' : (isHover ? '#00744d' : '#004B32'), borderRadius: '6px 6px 0 0', transition: 'background .12s' },\n        labelStyle: { flex: 1, textAlign: 'center', fontSize: '10.5px', color: (isCur || isHover) ? '#004B32' : '#9aa39e', fontWeight: (isCur || isHover) ? 700 : 400 },\n        tipStyle: showTip ? { fontSize: '11px', fontWeight: 700, color: '#004B32', background: '#F0F7EC', padding: '2px 8px', borderRadius: '7px', marginBottom: '6px', whiteSpace: 'nowrap' } : { fontSize: '0px', height: '0px', overflow: 'hidden' },\n      };\n    });\n\n    const sb = [['Nouveau', 8, '#FF6C4F'], ['En cours', 5, '#B26A00'], ['Validé', 11, '#004B32'], ['Payé', 9, '#7CC242'], ['En production', 6, '#1565C0'], ['Expédié', 8, '#6A1B9A']];\n    const sbMax = 11;\n    const statusBreakdown = sb.map((s) => ({ label: s[0], count: s[1], fillStyle: { width: (s[1] / sbMax * 100) + '%', height: '100%', background: s[2], borderRadius: '99px' } }));\n    const recent = base.slice(0, 4);\n\n    const railBtn = (active) => ({\n      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '5px', width: '84px',\n      padding: '11px 4px', border: 'none', cursor: 'pointer', borderRadius: '15px',\n      background: active ? '#AAE66E' : 'transparent', color: active ? '#004B32' : 'rgba(255,255,255,0.72)',\n    });\n    const fBtn = (active) => ({\n      display: 'inline-flex', alignItems: 'center', cursor: 'pointer',\n      background: active ? '#F0F7EC' : '#fff',\n      border: active ? '1px solid #004B32' : '1px solid rgba(0,75,50,0.12)',\n      color: '#3f5249', fontSize: '13px', padding: '8px 15px', borderRadius: '99px',\n    });\n    const toggle = (k) => () => this.setState((s) => ({ openFilter: s.openFilter === k ? null : k }));\n\n    return {\n      isDash: st.view === 'dashboard', isDevis: st.view === 'devis',\n      pageTitle: st.view === 'dashboard' ? 'tableau de bord' : 'devis',\n      goDash: () => this.setState({ view: 'dashboard', openFilter: null }),\n      goDevis: () => this.setState({ view: 'devis' }),\n      railDashStyle: railBtn(st.view === 'dashboard'),\n      railDevisStyle: railBtn(st.view === 'devis'),\n      quotes, chart, statusBreakdown, recent,\n      hasResults: count > 0, isEmpty: count === 0, countLabel,\n      query: st.query, onSearch: (e) => this.setState({ query: e.target.value }),\n      statusPills, sorts, arrows,\n      resetFilters: () => this.setState({ query: '', statusFilter: 'Tous' }),\n      showNature: st.openFilter === 'nature', showDelai: st.openFilter === 'delai', showPeriode: st.openFilter === 'periode',\n      toggleNature: toggle('nature'), toggleDelai: toggle('delai'), togglePeriode: toggle('periode'),\n      fNatureStyle: fBtn(st.openFilter === 'nature'), fDelaiStyle: fBtn(st.openFilter === 'delai'), fPeriodeStyle: fBtn(st.openFilter === 'periode'),\n      modalOpen: st.modalOpen, modalStatus: st.modalStatus,\n      openModal: () => this.setState({ modalOpen: true, openFilter: null }),\n      closeModal: () => this.setState({ modalOpen: false }),\n      setModalStatus: (s) => this.setState({ modalStatus: s }),\n      stop: (e) => { if (e && e.stopPropagation) e.stopPropagation(); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
